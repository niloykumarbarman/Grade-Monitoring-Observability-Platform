name: Frontend CI

on:
  push:
    paths: ['src/frontend/**']
  pull_request:
    paths: ['src/frontend/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      - run: cd src/frontend && npm ci
      - run: cd src/frontend && npm run build
