name: Deploy
on:
  push:
    branches: [main]
    paths:
      - 'src/services/**'
      - 'src/frontend/**'
      - 'deploy/**'
env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/grade-monitoring
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OrderService image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/services/OrderService/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest

      - name: Build and push GradeService image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/services/GradeService/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-grade-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-grade-service:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deploy/k8s/namespaces/
          kubectl apply -f deploy/k8s/configmaps/
          kubectl apply -f deploy/k8s/secrets/
          kubectl apply -f deploy/k8s/deployments/
          kubectl apply -f deploy/k8s/services/
          kubectl apply -f deploy/k8s/ingress/
          kubectl apply -f deploy/k8s/hpa/

      - name: Update images with latest SHA
        run: |
          kubectl set image deployment/order-service-api api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }} -n grade-monitoring
          kubectl set image deployment/grade-service grade-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-grade-service:${{ github.sha }} -n grade-monitoring

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/order-service-api -n grade-monitoring --timeout=120s
          kubectl rollout status deployment/grade-service -n grade-monitoring --timeout=120s
