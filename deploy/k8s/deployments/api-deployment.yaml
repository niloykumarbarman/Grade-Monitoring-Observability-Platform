apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: grade-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: grade-monitoring/api:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: api-config
